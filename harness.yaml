version: 1.0
project_type: python

plugin_timeout: 300

paths:
  domain: src/domain
  src: src
  tests: tests

modules:
  linter:
    enabled: true
    plugin: ruff
  type_checker:
    enabled: true
    plugin: mypy
  tests:
    enabled: true
    coverage_threshold: 80
  domain_purity:
    enabled: true
